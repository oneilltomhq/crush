<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crush — Voice Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #scene { width: 100%; height: 100%; }

    /* Chat overlay */
    #chat {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 45vh;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      z-index: 20;
      padding: 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85) 40%);
    }
    #chat-messages {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #chat-messages::-webkit-scrollbar { display: none; }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
      animation: fadeIn 0.3s ease-out;
    }
    .msg-agent {
      align-self: flex-start;
      background: rgba(99, 102, 241, 0.25);
      color: rgba(255,255,255,0.9);
      border-bottom-left-radius: 4px;
    }
    .msg-user {
      align-self: flex-end;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    #chat-typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 14px;
      align-self: flex-start;
    }
    #chat-typing.hidden { display: none; }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.6);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Replay button */
    #replay {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 30;
      background: rgba(99, 102, 241, 0.3);
      border: 1px solid rgba(99, 102, 241, 0.5);
      color: rgba(255,255,255,0.7);
      font: 13px -apple-system, sans-serif;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      display: none;
    }
    #replay:hover { background: rgba(99, 102, 241, 0.5); color: #fff; }
  </style>
</head>
<body>
  <div id="scene"></div>
  <button id="replay" onclick="location.reload()">Replay ↻</button>
  <script type="module" src="/src/voice-demo.ts"></script>
</body>
</html>
